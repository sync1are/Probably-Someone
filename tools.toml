[tools.function]
name = "set_current_status"
description = "Update the user's current status so the AI can inform contacts."
[tools.function.parameters]
type = "object"
required = [ "status",]
[tools.function.parameters.properties.status]
type = "string"
description = "The status description (e.g. 'Aze is on a coffee break')"

[[tools]]
type = "function"
[tools.function]
name = "take_som_screenshot"
description = "Take a screenshot with numbered red bounding boxes drawn over every interactive UI element (buttons, inputs, links, list items, etc.) in the focused window. Returns the annotated image and a map of { number -> element label }. Use this instead of take_screenshot when you need to click something — it eliminates coordinate guessing entirely. After calling this, use click_element to interact with elements by number."
[tools.function.parameters]
type = "object"
required = []
  [tools.function.parameters.properties.max_elements]
  type = "integer"
  description = "Maximum number of elements to label. Default is 40. Lower this if the screenshot feels cluttered."

[[tools]]
type = "function"
[tools.function]
name = "click_element"
description = "Click a UI element by its number from the most recent take_som_screenshot call. This is the preferred way to click anything after a SoM screenshot — do NOT use click_at with guessed coordinates when a SoM map is available. The element map is reset every time take_som_screenshot is called, so if the screen has changed, take a fresh SoM screenshot first."
[tools.function.parameters]
type = "object"
required = ["element_id"]
  [tools.function.parameters.properties.element_id]
  type = "integer"
  description = "The number shown in the red badge on the annotated screenshot."

