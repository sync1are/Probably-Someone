[tools.function]
name = "get_learned_search_url"
description = "Check if ARIA has previously learned the search URL structure for a specific domain. ALWAYS try this BEFORE attempting manual visual search (take_screenshot + click_at) on an unknown website. If this returns a URL, instantly use navigate_browser with it."
[tools.function.parameters]
type = "object"
required = ["domain", "query"]
  [tools.function.parameters.properties.domain]
  type = "string"
  description = "The root domain to check, e.g. 'imdb.com' or 'amazon.com'."
  [tools.function.parameters.properties.query]
  type = "string"
  description = "The search query the user wants to execute."

[[tools]]
type = "function"
[tools.function]
name = "save_search_template"
description = "Permanently learn a website's search URL structure so you can skip visual manual searching next time. Call this AFTER you successfully complete a manual visual search on an unknown website and land on the results page. You MUST use get_current_url to read the results URL, replace the actual search query word with the exact string '{query}', and save it."
[tools.function.parameters]
type = "object"
required = ["domain", "url_template"]
  [tools.function.parameters.properties.domain]
  type = "string"
  description = "The root domain, e.g. 'imdb.com' or 'amazon.com'."
  [tools.function.parameters.properties.url_template]
  type = "string"
  description = "The results URL you just landed on, but with the specific search term replaced by the exact literal string '{query}'. Example: 'https://www.imdb.com/find/?q={query}'"

[[tools]]
type = "function"
[tools.function]
name = "navigate_browser"
description = "Navigate the current browser tab to any URL instantly via CDP. ALWAYS prefer this over open_application for web tasks — it is faster, requires no new window, and works for any URL the LLM can construct. Examples: search Gmail → navigate_browser('https://mail.google.com/mail/u/0/#search/query'), search YouTube → navigate_browser('https://youtube.com/results?search_query=mrbeast'), search Pinterest → navigate_browser('https://pinterest.com/search/pins/?q=matching+pfp'). If Edge is not open, it will launch it automatically."
[tools.function.parameters]
type = "object"
required = ["url"]
  [tools.function.parameters.properties.url]
  type = "string"
  description = "The full URL to navigate to. The LLM should construct this dynamically based on the task (e.g. search URLs, direct page links)."

[[tools]]
type = "function"
[tools.function]
name = "get_current_url"
description = "Get the URL and title of the currently open browser tab. Use this to check what page is loaded before deciding next steps."
[tools.function.parameters]
type = "object"
required = []

